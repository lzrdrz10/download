<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PANEL LZPLAY • v2 (Múltiples Plataformas)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
    body { background: #050505; }
    .neon-text {
      font-family: 'Orbitron', sans-serif;
      text-shadow: 0 0 15px #00ff7f, 0 0 30px #00ff7f;
    }
    .card:hover { transform: scale(1.08) translateY(-10px); box-shadow: 0 0 40px rgba(0,255,127,0.5); }
    .chip { transition: all 0.2s; }
    .chip-active {
      background: #00ff7f !important;
      color: #000 !important;
      font-weight: bold;
    }
  </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center p-6 bg-[#050505]">
  <!-- Título -->
  <h2 class="text-5xl font-bold neon-text mb-8 text-center tracking-widest">PANEL series</h2>

  <!-- Buscador -->
  <div class="w-full max-w-3xl">
    <div class="relative">
      <input id="buscador" type="text"
        placeholder="🔍 Busca una película... (resultados en tiempo real)"
        class="w-full p-5 pl-14 rounded-3xl bg-[#0f0f0f] text-white border-2 border-[#00ff7f] focus:border-[#00ff7f] text-lg focus:ring-4 focus:ring-[#00ff7f]/30 placeholder:text-gray-400" />
      <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-[#00ff7f] text-2xl"></i>
    </div>
  </div>

  <!-- Resultados -->
  <div id="resultados" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6 mt-10 w-full max-w-6xl"></div>

  <!-- MODAL MEJORADO + SCROLLABLE -->
  <div id="modal" class="fixed inset-0 bg-black/90 hidden flex justify-center items-center z-[9999] p-4">
    <div class="modal-content bg-[#111] rounded-3xl shadow-2xl w-full max-w-2xl border border-[#00ff7f]/50 
                flex flex-col max-h-[92vh] overflow-hidden">

      <!-- Header fijo -->
      <div class="flex justify-between items-center border-b border-[#00ff7f]/30 px-8 py-5 flex-shrink-0">
        <h3 id="modal-titulo" class="text-2xl font-bold neon-text"></h3>
        <button onclick="cerrarModal()" class="text-4xl text-gray-400 hover:text-red-500">×</button>
      </div>

      <!-- ZONA SCROLLABLE -->
      <div class="flex-1 p-8 space-y-8 overflow-y-auto custom-scroll">
        <div class="flex gap-8">
          <img id="m-poster" class="w-40 rounded-2xl shadow-xl flex-shrink-0" alt="">
          <div class="flex-1">
            <p id="modal-sinopsis" class="text-gray-300 leading-relaxed"></p>
          </div>
        </div>

        <!-- Enlaces -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-[#00ff7f] text-sm mb-2">🎬 URL DEL VIDEO</label>
            <input id="videoLink" type="text" class="w-full p-4 rounded-2xl bg-[#1a1a1a] border border-[#00ff7f]/50 focus:border-[#00ff7f]" placeholder="https://...">
          </div>
          <div>
            <label class="block text-[#00ff7f] text-sm mb-2">⬇️ URL DE DESCARGA (opcional)</label>
            <input id="downloadLink" type="text" class="w-full p-4 rounded-2xl bg-[#1a1a1a] border border-[#00ff7f]/50 focus:border-[#00ff7f]" placeholder="https://...">
          </div>
        </div>

        <!-- PLATAFORMAS -->
        <div>
          <label class="block text-[#00ff7f] text-sm mb-3 font-medium">📌 PLATAFORMAS (selecciona todas las que quieras)</label>
          <div id="platforms-container" class="flex flex-wrap gap-3"></div>
        </div>

        <!-- GÉNEROS -->
        <div>
          <label class="block text-[#00ff7f] text-sm mb-3 font-medium">🏷️ GÉNEROS / ETIQUETAS</label>
          <div id="tags-container" class="flex flex-wrap gap-3 mb-4"></div>
          <div class="flex gap-3">
            <input id="new-tag" type="text" placeholder="Agregar etiqueta extra (ej: Terror)"
              class="flex-1 p-4 rounded-2xl bg-[#1a1a1a] border border-[#00ff7f]/50">
            <button id="add-tag-btn" class="px-8 bg-gradient-to-r from-[#00ff7f] to-[#00cc66] text-black font-bold rounded-2xl">+ AGREGAR</button>
          </div>
        </div>
      </div>

      <!-- Botones fijos abajo -->
      <div class="px-8 py-6 border-t border-[#00ff7f]/30 flex gap-4 flex-shrink-0">
        <button id="publicarBtn" class="flex-1 py-5 rounded-2xl font-bold text-xl bg-gradient-to-r from-[#00ff7f] to-[#00cc66] text-black hover:scale-105">
          ✅ GENERAR CÓDIGO
        </button>
        <button onclick="cerrarModal()" class="flex-1 py-5 rounded-2xl font-bold text-xl bg-red-600 hover:bg-red-700">❌ CANCELAR</button>
      </div>

      <!-- Animación (queda dentro del modal) -->
      <div id="animacionPublicar" class="hidden px-8 pb-8">
        <div class="w-full h-3 bg-[#1a1a1a] rounded-3xl overflow-hidden">
          <div id="progreso" class="h-3 bg-[#00ff7f] w-0 transition-all"></div>
        </div>
        <p id="mensaje" class="text-center mt-3 text-[#00ff7f]">Generando...</p>
      </div>
    </div>
  </div>

  <!-- SECCIÓN CÓDIGO -->
  <div id="output-section" class="hidden mt-12 w-full max-w-5xl">
    <h3 class="text-3xl font-bold neon-text mb-6 text-center">CÓDIGO GENERADO ✅</h3>
    <textarea id="output" readonly class="w-full h-96 p-6 bg-[#0a0a0a] text-[#00ff7f] font-mono text-sm rounded-3xl border border-[#00ff7f]/30"></textarea>
    <div class="flex gap-4 mt-6">
      <button id="copyBtn" class="flex-1 py-5 rounded-2xl bg-white text-black font-bold text-lg">📋 COPIAR</button>
      <button id="downloadBtn" class="flex-1 py-5 rounded-2xl bg-white text-black font-bold text-lg">⬇️ DESCARGAR</button>
      <button id="previewBtn" class="flex-1 py-5 rounded-2xl bg-white text-black font-bold text-lg">👁️ PREVISUALIZAR</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
